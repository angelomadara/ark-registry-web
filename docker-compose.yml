services:
  web:
    build:
      context: .
      target: development
    container_name: ark-registry-web
    ports:
      - "3081:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://api.arkregistry.org
    networks:
      - ark-network
    restart: unless-stopped

networks:
  ark-network:
    name: ark-network
    external: true
