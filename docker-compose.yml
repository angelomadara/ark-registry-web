services:
  web:
    build:
      context: .
      target: production
    container_name: ark-registry-web
    ports:
      - "3081:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.arkregistry.org
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUSTED_HOST=true
      - AUTH_URL=http://localhost:3000
    networks:
      - ark-network
    restart: unless-stopped

networks:
  ark-network:
    name: ark-network
    external: true
